name: Publish Website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 14.x

    - name: Install Dependencies
      run: npm install

    - name: Test Package
      run: npm test

    - name: Build Package
      run: npm run build

    - name: Assemble Site (outlook + outlook-beta)
      run: |
        mkdir -p ./out/outlook/
        cp manifest.xml ./out/outlook/manifest.xml
        cp -R assets ./out/outlook/
        cp -R dist/* ./out/outlook/

        mkdir -p ./out/outlook-beta/
        cp manifest.beta.xml ./out/outlook-beta/manifest.xml
        cp -R assets ./out/outlook-beta/
        cp -R dist/* ./out/outlook-beta/

    - name: Upload GitHub Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
